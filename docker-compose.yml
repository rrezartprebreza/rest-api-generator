# Docker Compose for running REST API Generator locally
#
# ── Quick start (no LLM, deterministic parser):
#   docker compose up
#
# ── With Ollama LLM (recommended — free-form prompts):
#   docker compose --profile llm up
#
#   Then pull a model (choose one):
#     docker exec rest-api-generator-ollama-1 ollama pull qwen2:7b          # default, fast, 4 GB
#     docker exec rest-api-generator-ollama-1 ollama pull llama3.2          # good alternative, 2 GB
#     docker exec rest-api-generator-ollama-1 ollama pull mistral            # solid, 4 GB
#     docker exec rest-api-generator-ollama-1 ollama pull codellama          # code-focused, 4 GB
#
# ── Switching models without rebuilding:
#   OLLAMA_MODEL=llama3.2 docker compose --profile llm up
#
# ── GPU acceleration (if you have NVIDIA GPU):
#   Uncomment the `deploy` block in the ollama service below.
#
# Either way, open http://localhost:8080
# The UI shows a badge: "LLM active" or "LLM offline" and always falls back gracefully.

services:
  rest-api-generator:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx256m
      # Points at the optional ollama sidecar when --profile llm is used.
      # If Ollama is not running the server falls back to deterministic parsing automatically.
      - OLLAMA_URL=http://ollama:11434
      # Override with: OLLAMA_MODEL=llama3.2 docker compose --profile llm up
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2:7b}
      # Increase if your machine is slow or model is large (e.g. 180 for 9B+ models)
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-90}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── Optional Ollama sidecar ───────────────────────────────────────────────
  # Only starts when you run: docker compose --profile llm up
  # Model data is persisted in the ollama-data volume between restarts.
  ollama:
    image: ollama/ollama:latest
    profiles: ["llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # ── Uncomment to enable NVIDIA GPU acceleration ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  ollama-data:
