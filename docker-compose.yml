# Docker Compose for running REST API Generator locally
#
# ── Quick start (no LLM, deterministic parser):
#   docker compose up
#
# ── With local Ollama LLM (default local preference):
#   docker compose --profile llm up
#
#   Then pull a model (choose one):
#     docker exec rest-api-generator-ollama-1 ollama pull qwen2:7b          # default, fast, 4 GB
#     docker exec rest-api-generator-ollama-1 ollama pull llama3.2          # good alternative, 2 GB
#     docker exec rest-api-generator-ollama-1 ollama pull mistral            # solid, 4 GB
#
# ── With Groq (production cloud LLM — free tier available):
#   APP_ENV=production LLM_API_KEY=<your-groq-key> docker compose up
#   Get your free key at: https://console.groq.com
#
# ── With OpenRouter (or any OpenAI-compatible provider):
#   APP_ENV=production LLM_API_KEY=<key> LLM_BASE_URL=https://openrouter.ai/api/v1 docker compose up
#
# ── Runtime policy:
#   APP_ENV=local       => Ollama first, then Groq/cloud, then deterministic
#   APP_ENV=production  => Groq/cloud first, then Ollama, then deterministic
#   APP_ENV unset       => Groq/cloud first, then Ollama, then deterministic
#
# Either way, open http://localhost:8080

services:
  rest-api-generator:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx256m
      - APP_ENV=${APP_ENV:-local}
      # ── Production / Cloud LLM (Groq by default) ─────────────────────────
      # Set APP_ENV=production and LLM_API_KEY to prefer Groq/cloud.
      # Free key: https://console.groq.com
      - LLM_API_KEY=${LLM_API_KEY:-}
      # Optional: override provider URL (default: https://api.groq.com/openai/v1)
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      # Optional: override model (default: llama-3.3-70b-versatile)
      - LLM_MODEL=${LLM_MODEL:-}
      # ── Local Ollama LLM ──────────────────────────────────────────────────
      # docker compose is primarily for local runs, so default to the sidecar URL.
      # Start the sidecar with: docker compose --profile llm up
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2:7b}
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-90}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── Optional Ollama sidecar ───────────────────────────────────────────────
  # Only starts when you run: docker compose --profile llm up
  # The main service already points at http://ollama:11434 by default.
  ollama:
    image: ollama/ollama:latest
    profiles: ["llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # ── Uncomment to enable NVIDIA GPU acceleration ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  ollama-data:
