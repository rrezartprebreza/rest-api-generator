# Docker Compose for running REST API Generator locally
# Usage:
#   docker compose up           → starts the generator UI on http://localhost:8080
#   docker compose up --build   → rebuild after code changes

services:
  rest-api-generator:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
